<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/shield.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#121310" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="preload"
            as="style"
            href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <title>Secretly</title>
    </head>
    <body>
        <script>
            (function () {
                try {
                    var t = localStorage.getItem("secretly-theme");
                    document.documentElement.setAttribute(
                        "data-theme",
                        t === "light" || t === "dark" ? t : "dark",
                    );
                } catch (e) {
                    document.documentElement.setAttribute("data-theme", "dark");
                }
            })();
        </script>
        <script src="/config.js"></script>
        <div id="root" style="width: 100%"></div>
        <div id="modal-root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
