# Development stack: only PostgreSQL runs in Docker.
# The API runs on the host with hot reload (devops/scripts/dev.sh)
# and the frontend runs with Vite (npm run dev).
#
#   ./devops/scripts/dev.sh

name: secretly

services:
    db:
        image: postgres:16
        container_name: secretly_db
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASS}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
