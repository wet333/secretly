# Local build stack: builds both images from source and runs the
# full system (frontend + API + PostgreSQL). Used to validate the
# production build before publishing images to DockerHub.
#
#   ./devops/scripts/prod-local.sh
#
# Frontend: http://localhost:3000
# API:      http://localhost:8080/api/

name: secretly-prod

services:
    frontend:
        build: ../frontend
        container_name: secretly_prod_frontend
        environment:
            - API_URL=http://localhost:8080/api/
        ports:
            - "3000:80"
        depends_on:
            - backend

    backend:
        build: ../secretly_api
        container_name: secretly_prod_backend
        environment:
            - API_SECRET=${API_SECRET}
            - DB_HOST=db
            - DB_NAME=${DB_NAME}
            - DB_USER=${DB_USER}
            - DB_PASS=${DB_PASS}
            - DB_DLL_MODE=${DB_DLL_MODE}
            - LOGGING_LEVEL=${LOGGING_LEVEL}
            - CORS_HOST=${CORS_HOST}
        ports:
            - "8080:8080"
        depends_on:
            db:
                condition: service_healthy

    db:
        image: postgres:16
        container_name: secretly_prod_db
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASS}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
